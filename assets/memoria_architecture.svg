
<svg width="100%" viewBox="0 0 680 740">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- User input -->
  <g class="c-gray">
    <rect x="240" y="30" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="52" text-anchor="middle" dominant-baseline="central">User message</text>
  </g>
  <line x1="340" y1="74" x2="340" y2="104" class="arr" marker-end="url(#arrow)"/>

  <!-- embeddings.py -->
  <g class="c-purple">
    <rect x="200" y="104" width="280" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="124" text-anchor="middle" dominant-baseline="central">embeddings.py</text>
    <text class="ts" x="340" y="144" text-anchor="middle" dominant-baseline="central">text → 384-dim vector</text>
  </g>
  <line x1="340" y1="160" x2="340" y2="190" class="arr" marker-end="url(#arrow)"/>

  <!-- Fork: store left, search right -->
  <line x1="340" y1="190" x2="180" y2="190" class="arr"/>
  <line x1="180" y1="190" x2="180" y2="220" class="arr" marker-end="url(#arrow)"/>

  <line x1="340" y1="190" x2="500" y2="190" class="arr"/>
  <line x1="500" y1="190" x2="500" y2="220" class="arr" marker-end="url(#arrow)"/>

  <!-- Fork labels -->
  <text class="ts" x="120" y="187" text-anchor="middle" dominant-baseline="central">store</text>
  <text class="ts" x="556" y="187" text-anchor="middle" dominant-baseline="central">search</text>

  <!-- memory_store.py left: upsert -->
  <g class="c-teal">
    <rect x="80" y="220" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="240" text-anchor="middle" dominant-baseline="central">memory_store.py</text>
    <text class="ts" x="180" y="260" text-anchor="middle" dominant-baseline="central">upsert vector + metadata</text>
  </g>

  <!-- memory_store.py right: query -->
  <g class="c-teal">
    <rect x="400" y="220" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="240" text-anchor="middle" dominant-baseline="central">memory_store.py</text>
    <text class="ts" x="500" y="260" text-anchor="middle" dominant-baseline="central">query top-k similar vectors</text>
  </g>

  <!-- Endee below left store -->
  <line x1="180" y1="276" x2="180" y2="306" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="80" y="306" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="180" y="326" text-anchor="middle" dominant-baseline="central">Endee vector DB</text>
    <text class="ts" x="180" y="346" text-anchor="middle" dominant-baseline="central">persists memory</text>
  </g>

  <!-- Endee below right query -->
  <line x1="500" y1="276" x2="500" y2="306" class="arr" marker-end="url(#arrow)"/>
  <g class="c-gray">
    <rect x="400" y="306" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="500" y="326" text-anchor="middle" dominant-baseline="central">Endee vector DB</text>
    <text class="ts" x="500" y="346" text-anchor="middle" dominant-baseline="central">returns similar memories</text>
  </g>

  <!-- retrieval.py: comes from right endee -->
  <line x1="500" y1="362" x2="500" y2="406" class="arr"/>
  <line x1="500" y1="406" x2="400" y2="406" class="arr" marker-end="url(#arrow)"/>

  <g class="c-purple">
    <rect x="200" y="384" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="404" text-anchor="middle" dominant-baseline="central">retrieval.py</text>
    <text class="ts" x="300" y="424" text-anchor="middle" dominant-baseline="central">threshold + recency filter</text>
  </g>
  <line x1="300" y1="440" x2="300" y2="470" class="arr" marker-end="url(#arrow)"/>

  <!-- build_prompt -->
  <g class="c-gray">
    <rect x="200" y="470" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="490" text-anchor="middle" dominant-baseline="central">build_prompt()</text>
    <text class="ts" x="300" y="510" text-anchor="middle" dominant-baseline="central">memories + current query</text>
  </g>
  <line x1="300" y1="526" x2="300" y2="556" class="arr" marker-end="url(#arrow)"/>

  <!-- agent.py -->
  <g class="c-coral">
    <rect x="200" y="556" width="200" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="300" y="576" text-anchor="middle" dominant-baseline="central">agent.py</text>
    <text class="ts" x="300" y="596" text-anchor="middle" dominant-baseline="central">Groq → Llama 3.3 response</text>
  </g>
  <line x1="300" y1="612" x2="300" y2="642" class="arr" marker-end="url(#arrow)"/>

  <!-- Response stored back -->
  <line x1="300" y1="642" x2="180" y2="642" class="arr"/>
  <line x1="180" y1="642" x2="180" y2="362" class="arr" stroke-dasharray="4 3"/>
  <text class="ts" x="96" y="510" text-anchor="middle">store reply</text>

  <!-- UI output -->
  <g class="c-gray">
    <rect x="240" y="642" width="200" height="44" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="664" text-anchor="middle" dominant-baseline="central">Flask UI response</text>
  </g>

  <!-- File labels on right margin -->
  <text class="ts" x="620" y="135" text-anchor="start">embeddings.py</text>
  <line class="leader" x1="480" y1="132" x2="614" y2="132"/>

  <text class="ts" x="620" y="252" text-anchor="start">memory_store.py</text>
  <line class="leader" x1="600" y1="248" x2="614" y2="248"/>

  <text class="ts" x="620" y="415" text-anchor="start">retrieval.py</text>
  <line class="leader" x1="400" y1="412" x2="614" y2="412"/>

  <text class="ts" x="620" y="578" text-anchor="start">agent.py</text>
  <line class="leader" x1="400" y1="584" x2="614" y2="584"/>
</svg>
